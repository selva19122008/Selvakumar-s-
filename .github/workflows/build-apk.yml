name: Build Android APK

on:
  push:
    branches: [ "main", "master", "development" ]
  pull_request:
    branches: [ "main", "master", "development" ]

jobs:
  build:
    name: Build & Release Signed APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate and Auto-Recover Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          # Detect the configured Gradle version from properties
          VERSION=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties | sed -n 's/.*gradle-\([0-9.]*\)-.*/\1/p')
          if [ -z "$VERSION" ]; then
            VERSION="9.3.1"
          fi
          echo "✨ Detected Gradle Version: $VERSION"
          
          echo "🔄 Fetching pristine Gradle Wrapper binary from official sources to prevent Git line-ending / CRLF corruptions..."
          curl -sL --retry 3 --retry-delay 2 "https://raw.githubusercontent.com/gradle/gradle/v${VERSION}/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          
          # Verification check
          if [ ! -s "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "⚠️ Official version-specific jar fetch failed. Fetching standard reliable release build wrapper..."
            curl -sL --retry 3 --retry-delay 2 "https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          fi
          
          # Final size/sanity check
          if [ ! -s "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "❌ CRITICAL: Failed to repair Gradle Wrapper jar. Fallback to generating via Gradle CLI..."
            gradle wrapper --gradle-version $VERSION || echo "Pre-installed gradle wrapper generation failed"
          else
            echo "✅ Gradle Wrapper jar repaired successfully (size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes)."
          fi

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BattleZone-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
